version: '3.9'

services:
  db:
    image: mysql:latest
    container_name: mysql_test
    restart: always
    environment:
      MYSQL_DATABASE: tica_local
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: tica_user
      MYSQL_PASSWORD: pass123
    ports:
      - 3306:3306
    volumes:
      - ./mysql_data:/var/lib/mysql